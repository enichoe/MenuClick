<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú Digital - MenuQR Pro</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  
  <!-- Global Styles -->
  <link rel="stylesheet" href="css/styles.css">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          },
          colors: {
            surface: { 50: '#0a0a0b', 100: '#121214', 200: '#1a1a1d', 300: '#242428', 400: '#2e2e33', 500: '#3d3d42' },
            accent: { DEFAULT: '#10b981', light: '#34d399', dark: '#059669' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-surface-50" data-page="menu">
  <!-- Toast Container -->
  <div id="toastContainer" class="toast-container"></div>
  
  <div id="publicMenuView" class="view active">
    <!-- Banner Image -->
    <div id="publicMenuBanner" class="w-full h-56 sm:h-80 overflow-hidden hidden bg-surface-200 relative">
      <div class="absolute inset-0 bg-gradient-to-t from-surface-50/50 to-transparent"></div>
      <img id="publicBannerImg" src="" alt="Portada" class="w-full h-full object-cover">
    </div>

    <!-- Menu Header -->
    <header id="publicMenuHeader" class="relative pb-8 px-4 text-center">
      <div class="max-w-lg mx-auto">
        <div id="publicMenuLogo" class="w-32 h-32 mx-auto rounded-3xl bg-surface-100 border-4 border-surface-400 p-1 -mt-16 mb-4 overflow-hidden shadow-2xl relative z-10 transition-transform hover:scale-105">
          <div class="w-full h-full rounded-2xl bg-surface-200 flex items-center justify-center">
             <img id="publicLogoImg" src="" alt="" class="w-full h-full object-contain hidden">
             <i id="publicLogoIcon" data-lucide="store" class="w-12 h-12 text-surface-500"></i>
          </div>
        </div>
        <h1 id="publicMenuTitle" class="font-display text-4xl font-bold mb-2">Cargando...</h1>
        <p id="publicMenuDesc" class="text-surface-500 text-lg mb-6"></p>
        
        <!-- Social & Contact Links -->
        <div id="socialLinks" class="flex flex-wrap justify-center gap-4 mb-8"></div>
      </div>
    </header>
    
    <!-- Info & Hours Section (Accordion or simple list) -->
    <div class="max-w-2xl mx-auto px-4 mb-8">
      <div class="card p-6 bg-surface-100/50 border-surface-400">
        <div class="grid sm:grid-cols-2 gap-6 text-left">
          <div id="publicRestaurantInfo">
            <h3 class="flex items-center gap-2 font-bold mb-3"><i data-lucide="map-pin" class="w-4 h-4 text-cyan-500"></i> Ubicación</h3>
            <p id="publicAddress" class="text-sm text-surface-500 mb-2">Cargando dirección...</p>
            <a id="publicMapsLink" href="#" target="_blank" class="text-xs text-accent hover:underline hidden">Ver en Google Maps</a>
          </div>
          <div id="publicHoursInfo">
            <h3 class="flex items-center gap-2 font-bold mb-3"><i data-lucide="clock" class="w-4 h-4 text-coral"></i> Horarios</h3>
            <div id="publicHoursList" class="text-xs text-surface-500 space-y-1"></div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Category Navigation -->
    <nav id="categoryNav" class="sticky top-0 z-40 glass border-b border-surface-400 py-3 px-0 overflow-x-auto">
      <div class="flex gap-3 justify-start px-4 min-w-max" id="categoryTabs"></div>
    </nav>
    
    <!-- Menu Items -->
    <main class="max-w-2xl mx-auto p-4 py-8">
      <div id="publicMenuItems" class="space-y-6"></div>
      <div id="publicMenuEmpty" class="hidden text-center py-20">
        <p class="text-surface-500 text-lg">Este menú aún no tiene platos.</p>
      </div>
    </main>
    
    <footer class="py-12 text-center border-t border-surface-400 mt-12 bg-surface-100">
      <p class="text-sm text-surface-500">Powered by <span class="text-accent font-semibold">MenuClick</span></p>
    </footer>
  </div>

  <script src="js/main.js" type="module"></script>
</body>
</html>
